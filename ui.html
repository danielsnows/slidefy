<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Slidefy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Fontes: uso de system stack para evitar CSP do iframe do Figma (não carrega link externo) -->
    <!-- Estilos EMBUTIDOS para garantir que o Figma carregue tudo via __html__ -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      .app,
      .app * {
        font-family: inherit;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #05060a;
        color: #f5f5f8;
      }

      .app {
        height: 100vh;
        width: 100%;
        padding: 32px 40px 32px;
        background: radial-gradient(circle at top left, #181924 0%, #05060a 55%, #030307 100%);
        display: flex;
        flex-direction: column;
      }

      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
      }

      .app-header-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .app-logo {
        height: 24px;
        width: auto;
        display: block;
      }

      .app-header-right {
        font-size: 12px;
        color: #d7d7e5;
      }

      #headerTagline {
        transition: opacity 0.25s ease;
      }

      #headerTagline.tagline-fade-out {
        opacity: 0;
      }

      .layout-main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .screen-title {
        font-size: 56px;
        font-weight: 600;
      }

      .stepper-pill {
        display: inline-flex;
        padding: 4px;
        border-radius: 999px;
        background: rgba(18, 18, 22, 0.95);
        gap: 4px;
      }

      .stepper-pill-item {
        min-width: 44px;
        height: 28px;
        border-radius: 999px;
        border: none;
        outline: none;
        font-size: 12px;
        font-weight: 500;
        cursor: default;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f5f5fa;
        background: transparent;
        opacity: 0.6;
      }

      .stepper-pill-item--active {
        background: #ffffff;
        color: #111217;
        opacity: 1;
      }

      .content-area {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .screen {
        flex: 1;
        display: none;
        flex-direction: column;
      }

      .screen--active {
        display: flex;
      }

      /* TELA 1 – UPLOAD */
      .upload-dropzone {
        margin-top: 16px;
        border-radius: 32px;
        border: 1px dashed rgba(115, 118, 150, 0.8);
        background: #080910;
        height: 260px;
        padding: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        position: relative;
        color: #f5f5f8;
      }

      .upload-dropzone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .upload-inner-circle {
        width: 96px;
        height: 96px;
        border-radius: 999px;
        background: radial-gradient(circle at center, #262734 0%, #101118 65%, #05060a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .upload-photo-icon {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }

      .upload-button {
        margin-top: 8px;
        padding: 10px 24px;
        border-radius: 999px;
        background: #181820;
        border: none;
        color: #f5f5f8;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .upload-formats {
        margin-top: 8px;
        font-size: 11px;
        color: #6f707e;
      }

      /* TELA 2 – TEMPLATES (cards estilo Instagram) */
      .templates-grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 20px;
      }

      .template-card {
        border-radius: 16px;
        background: #10121A;
        border: 1px solid #202331;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .template-card:hover {
        background: #212535;
        border-color: #2a2d3a;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
      }

      .template-card--selected {
        background: linear-gradient(135deg, #ff4f9a, #ff8a3d);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(255, 79, 154, 0.25);
      }

      .template-card.template-card--selected:hover {
        background: linear-gradient(135deg, #ff4f9a, #ff8a3d);
        border-color: rgba(255, 255, 255, 0.15);
        box-shadow: 0 4px 24px rgba(255, 79, 154, 0.25);
      }

      .template-card-image-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        overflow: hidden;
        background: #0d0e12;
      }

      .template-card-thumb {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        object-fit: cover;
        object-position: 0 50%;
        transition: transform 0.35s ease-out;
        pointer-events: none;
      }

      .template-card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        background: #10121A;
        border-top: 1px solid #202331;
        min-height: 44px;
      }

      .template-card:hover .template-card-footer {
        background: #212535;
      }

      .template-card--selected .template-card-footer,
      .template-card.template-card--selected:hover .template-card-footer {
        background: rgba(0, 0, 0, 0.25);
      }

      .template-card-icons {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .template-card-icons img {
        height: 22px;
        width: auto;
        object-fit: contain;
        opacity: 0.9;
      }

      .template-chip {
        padding: 4px 10px;
        border-radius: 999px;
        background: #0d2417;
        color: #4dd38d;
        font-size: 10px;
        font-weight: 500;
        flex-shrink: 0;
      }

      /* TELA 3 – CONCLUSÃO */
      .check-final-img {
        margin-top: 40px;
        align-self: center;
        width: 180px;
        height: 180px;
        object-fit: contain;
      }

      /* GRID DE IMAGENS (após upload) */
      .upload-grid-view {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
      }

      .upload-grid-view--visible {
        display: flex;
      }

      .upload-dropzone-view {
        display: flex;
        flex: 1;
        flex-direction: column;
      }

      .upload-dropzone-view--hidden {
        display: none;
      }

      .images-grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }

      .image-card {
        position: relative;
        aspect-ratio: 1;
        border-radius: 12px;
        overflow: hidden;
        background: #161824;
      }

      .image-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .image-card-delete {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.6);
        border: none;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.15s ease;
      }

      .image-card:hover .image-card-delete {
        opacity: 1;
      }

      .image-card-drag-handle {
        position: absolute;
        left: 8px;
        top: 8px;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.5);
        border: none;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        opacity: 0;
        transition: opacity 0.15s ease;
      }

      .image-card:hover .image-card-drag-handle {
        opacity: 1;
      }

      .image-card-drag-handle:active {
        cursor: grabbing;
      }

      .image-card-drag-handle svg {
        width: 14px;
        height: 14px;
        color: #fff;
      }

      .image-card--dragging {
        opacity: 0.6;
        cursor: grabbing;
      }

      .image-card--drag-over {
        outline: 2px solid rgba(248, 56, 139, 0.8);
        outline-offset: 2px;
      }

      .images-grid-hint {
        font-size: 12px;
        color: #989FB7;
        margin: 0 0 8px 0;
        display: none;
      }

      .images-grid-hint--visible {
        display: block;
      }

      .upload-add-more-btn {
        aspect-ratio: 1;
        border-radius: 12px;
        border: 1px dashed rgba(115, 118, 150, 0.8);
        background: rgba(22, 24, 36, 0.6);
        color: #f5f5f8;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease, border-color 0.15s ease;
      }

      .upload-add-more-btn:hover {
        background: rgba(33, 37, 53, 0.8);
        border-color: rgba(115, 118, 150, 1);
      }

      .upload-add-more-btn svg {
        width: 32px;
        height: 32px;
        opacity: 0.7;
      }

      /* TELA 3 – CRIANDO */
      .creating-screen-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 40px 0;
        flex: 1;
      }

      .progress-bar-container {
        width: 100%;
        max-width: 520px;
        height: 37px;
        border-radius: 999px;
        background: #10121A;
        overflow: hidden;
        position: relative;
      }

      .progress-bar-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #f8388b 0%, #ffa84b 100%);
        transition: width 0.3s ease;
      }

      .progress-percent {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        font-weight: 400;
        color: #F3F4F7;
      }

      .progress-log {
        font-size: 16px;
        color: #989FB7;
        min-height: 24px;
        text-align: center;
        overflow: hidden;
      }

      .progress-log-text {
        display: inline-block;
        animation: logFadeIn 0.4s ease, logFadeOut 0.3s ease 2.7s forwards;
      }

      @keyframes logFadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes logFadeOut {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-8px);
        }
      }

      .btn-icon {
        width: 20px;
        height: 20px;
        object-fit: contain;
      }

      .btn-primary .btn-icon,
      .btn-circle .btn-icon {
        flex-shrink: 0;
      }

      .btn-figma-logo {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }

      /* FOOTER – botões */
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 40px;
      }

      .btn-circle {
        width: 64px;
        height: 64px;
        border-radius: 999px;
        border: none;
        background: #181820;
        color: #f5f5f8;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0.9;
      }

      .btn-circle:disabled {
        opacity: 0.2;
        cursor: default;
      }

      .btn-primary {
        min-width: 260px;
        height: 64px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #ff4f9a, #ff8a3d);
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
      }

      .btn-primary:disabled {
        opacity: 0.4;
        cursor: default;
        box-shadow: none;
      }

      .btn-primary-icon {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: #ffffff;
      }

      /* Anatomia do botão "Criar Slides" (apenas quando exibido) */
      .btn-primary.btn-primary--criar-slides {
        padding: 12px 40px 12px 12px;
        font-size: 32px;
        font-weight: 700;
      }

      .btn-primary.btn-primary--criar-slides .btn-figma-logo {
        width: 40px;
        height: 40px;
        object-fit: contain;
        background: #ffffff;
        border-radius: 999px;
        padding: 6px;
        box-sizing: border-box;
        flex-shrink: 0;
      }
    </style>
  </head>

      function updateStepperPill() {
        const pills = document.querySelectorAll("[data-step-pill]");
        pills.forEach((el) => {
          const step = Number(el.getAttribute("data-step-pill"));
          el.classList.toggle("stepper-pill-item--active", step === state.step);
        });
      }

      function updateScreenTitle() {
        const title = document.getElementById("screenTitle");
        if (!title) return;
        if (state.step === 1) title.textContent = "Upload";
        if (state.step === 2) title.textContent = "Tema";
        if (state.step === 3) title.textContent = "Criando";
        if (state.step === 4) title.textContent = "Pronto!";
      }

      function updateScreensVisibility() {
        document.querySelectorAll(".screen").forEach((el) => {
          const screen = Number(el.getAttribute("data-screen"));
          el.classList.toggle("screen--active", screen === state.step);
        });
      }

      function updateFooterButtons() {
        const back = document.getElementById("btnBack");
        const primary = document.getElementById("btnPrimary");
        const primaryLabel = document.getElementById("btnPrimaryLabel");
        const figmaLogo = document.getElementById("btnFigmaLogo");
        const arrowIcon = document.getElementById("btnPrimaryArrow");

        if (!back || !primary || !primaryLabel) return;

        back.disabled = state.step === 1;

        if (state.step === 1) {
          primaryLabel.textContent = "Continuar";
          primary.disabled = state.uploadedImages.length === 0;
          primary.style.display = "";
          primary.classList.remove("btn-primary--criar-slides");
          back.style.display = "";
          if (figmaLogo) figmaLogo.style.display = "none";
          if (arrowIcon) arrowIcon.style.display = "block";
        } else if (state.step === 2) {
          primaryLabel.textContent = "Criar Slides";
          primary.disabled = !state.selectedTemplateId || state.uploadedImages.length === 0;
          primary.style.display = "";
          primary.classList.add("btn-primary--criar-slides");
          back.style.display = "";
          if (figmaLogo) figmaLogo.style.display = "";
          if (arrowIcon) arrowIcon.style.display = "none";
        } else if (state.step === 3) {
          primary.style.display = "none";
          back.style.display = "none";
        } else {
          primary.style.display = "none";
          back.style.display = "";
        }
      }

      function setStep(step) {
        state.step = step;
        updateStepperPill();
        updateScreenTitle();
        updateScreensVisibility();
        updateUploadViews();
        updateFooterButtons();
      }

      function updateUploadViews() {
        const dropzoneView = document.getElementById("uploadDropzoneView");
        const gridView = document.getElementById("uploadGridView");
        if (!dropzoneView || !gridView) return;

        const hasImages = state.uploadedImages.length > 0;
        dropzoneView.classList.toggle("upload-dropzone-view--hidden", hasImages);
        gridView.classList.toggle("upload-grid-view--visible", hasImages);
        if (hasImages) renderImagesGrid();
      }

      function renderImagesGrid() {
        const grid = document.getElementById("imagesGrid");
        const hintEl = document.getElementById("imagesGridHint");
        if (!grid) return;
        if (hintEl) hintEl.classList.toggle("images-grid-hint--visible", state.uploadedImages.length > 1);
        grid.innerHTML = "";

        const gripSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="8" y2="18"></line><line x1="12" y1="6" x2="12" y2="18"></line><line x1="16" y1="6" x2="16" y2="18"></line></svg>';

        state.uploadedImages.forEach((file, index) => {
          const card = document.createElement("div");
          card.className = "image-card";
          card.setAttribute("data-index", String(index));
          card.draggable = true;

          const handle = document.createElement("div");
          handle.className = "image-card-drag-handle";
          handle.setAttribute("aria-label", "Arrastar para reordenar");
          handle.innerHTML = gripSvg;

          const img = document.createElement("img");
          img.loading = "lazy";
          img.alt = file.name;
          img.src = URL.createObjectURL(file);
          img.onload = function () {
            URL.revokeObjectURL(img.src);
          };

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "image-card-delete";
          deleteBtn.type = "button";
          deleteBtn.setAttribute("aria-label", "Excluir");
          deleteBtn.textContent = "×";
          deleteBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            state.uploadedImages.splice(index, 1);
            renderImagesGrid();
            updateUploadViews();
            updateFooterButtons();
          });

          card.addEventListener("dragstart", function (e) {
            dragSourceIndex = index;
            card.classList.add("image-card--dragging");
            if (e.dataTransfer) {
              e.dataTransfer.effectAllowed = "move";
              e.dataTransfer.setData("text/plain", String(index));
            }
          });
          card.addEventListener("dragend", function () {
            card.classList.remove("image-card--dragging");
            grid.querySelectorAll(".image-card--drag-over").forEach(function (c) { c.classList.remove("image-card--drag-over"); });
            dragSourceIndex = -1;
          });
          card.addEventListener("dragover", function (e) {
            e.preventDefault();
            if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
            if (card.hasAttribute("data-index")) card.classList.add("image-card--drag-over");
          });
          card.addEventListener("dragleave", function () {
            card.classList.remove("image-card--drag-over");
          });
          card.addEventListener("drop", function (e) {
            e.preventDefault();
            card.classList.remove("image-card--drag-over");
            var toIndex = parseInt(card.getAttribute("data-index"), 10);
            if (dragSourceIndex === -1 || dragSourceIndex === toIndex) return;
            var fromIndex = dragSourceIndex;
            var item = state.uploadedImages.splice(fromIndex, 1)[0];
            state.uploadedImages.splice(toIndex, 0, item);
            renderImagesGrid();
            updateFooterButtons();
          });

          card.appendChild(handle);
          card.appendChild(img);
          card.appendChild(deleteBtn);
          grid.appendChild(card);
        });

        const addMoreBtn = document.createElement("button");
        addMoreBtn.type = "button";
        addMoreBtn.className = "upload-add-more-btn image-card";
        addMoreBtn.setAttribute("aria-label", "Adicionar mais imagens");
        addMoreBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>';
        addMoreBtn.addEventListener("click", () => {
          const input = document.getElementById("fileInputAddMore");
          if (input) input.click();
        });
        grid.appendChild(addMoreBtn);
      }

      function handleFilesSelected(files, append) {
        if (!files || files.length === 0) {
          if (!append) {
            state.uploadedImages = [];
            updateFooterButtons();
          }
          return;
        }

        const validFiles = append ? [...state.uploadedImages] : [];
        for (let i = 0; i < files.length; i++) {
          const f = files[i];
          validFiles.push(f);
          if (validFiles.length >= state.maxFiles) break;
        }
        state.uploadedImages = validFiles;
        updateUploadViews();
        updateFooterButtons();
      }

      const SLIDE_PAUSE_MS = 1000;
      const SLIDE_TRANSITION_MS = 350;

      function startSlideAnimation(card, imageWrap, thumb, slides) {
        if (!thumb || slides < 2) return;
        const widthPx = imageWrap.offsetWidth;
        if (widthPx <= 0) return;
        if (card._slideTimeouts) {
          card._slideTimeouts.forEach(clearTimeout);
        }
        thumb.style.transition = "transform " + (SLIDE_TRANSITION_MS / 1000) + "s ease-out";
        thumb.style.transform = "translateX(0)";
        const timeouts = [];
        for (let i = 1; i < slides; i++) {
          const slideIndex = i;
          const t = SLIDE_PAUSE_MS + (i - 1) * (SLIDE_PAUSE_MS + SLIDE_TRANSITION_MS);
          timeouts.push(setTimeout(() => {
            if (!card._slideHover) return;
            thumb.style.transform = "translateX(" + (-slideIndex * widthPx) + "px)";
          }, t));
        }
        card._slideTimeouts = timeouts;
      }

      function stopSlideAnimation(card, thumb) {
        if (card._slideTimeouts) {
          card._slideTimeouts.forEach(clearTimeout);
          card._slideTimeouts = null;
        }
        if (thumb) {
          thumb.style.transition = "transform 0.35s ease-out";
          thumb.style.transform = "translateX(0)";
        }
      }

      function renderTemplates() {
        const grid = document.getElementById("templatesGrid");
        const iconsSrcEl = document.getElementById("igCardIconsSrc");
        if (!grid) return;
        grid.innerHTML = "";
        const iconsSrc = iconsSrcEl ? iconsSrcEl.src : "";

        templates.forEach((t) => {
          const card = document.createElement("div");
          card.className = "template-card";
          card.setAttribute("data-template-id", t.id);
          card.setAttribute("data-slides", String(t.slides));

          const imageWrap = document.createElement("div");
          imageWrap.className = "template-card-image-wrap";
          let thumb = null;
          if (t.thumbnail) {
            thumb = document.createElement("img");
            thumb.className = "template-card-thumb";
            thumb.src = t.thumbnail;
            thumb.alt = t.name || t.id;
            thumb.style.width = (t.slides * 100) + "%";
            imageWrap.appendChild(thumb);
          }
          card.appendChild(imageWrap);

          const footer = document.createElement("div");
          footer.className = "template-card-footer";
          const iconsWrap = document.createElement("div");
          iconsWrap.className = "template-card-icons";
          if (iconsSrc) {
            const iconsImg = document.createElement("img");
            iconsImg.src = iconsSrc;
            iconsImg.alt = "";
            iconsWrap.appendChild(iconsImg);
          }
          footer.appendChild(iconsWrap);
          const chip = document.createElement("div");
          chip.className = "template-chip";
          chip.textContent = `${t.slides} slides`;
          footer.appendChild(chip);
          card.appendChild(footer);

          card.addEventListener("mouseenter", () => {
            card._slideHover = true;
            const slides = parseInt(card.getAttribute("data-slides"), 10) || 3;
            const wrap = card.querySelector(".template-card-image-wrap");
            const th = card.querySelector(".template-card-thumb");
            if (wrap && th) startSlideAnimation(card, wrap, th, slides);
          });
          card.addEventListener("mouseleave", () => {
            card._slideHover = false;
            stopSlideAnimation(card, card.querySelector(".template-card-thumb"));
          });

          card.addEventListener("click", () => {
            state.selectedTemplateId = t.id;
            document.querySelectorAll(".template-card").forEach((c) => {
              const id = c.getAttribute("data-template-id");
              c.classList.toggle("template-card--selected", id === t.id);
            });
            updateFooterButtons();
          });

          grid.appendChild(card);
        });
      }

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const result = reader.result;
            const base64 = (result && typeof result === "string") ? result.split(",")[1] || "" : "";
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function createCarousel(templateId, images) {
        const imagesBase64 = [];
        for (let i = 0; i < images.length; i++) {
          const b64 = await fileToBase64(images[i]);
          if (b64) imagesBase64.push(b64);
        }
        parent.postMessage(
          {
            pluginMessage: {
              type: "create-carousel",
              templateId,
              imagesMetadata: Array.from(images).map((f) => ({
                name: f.name,
                size: f.size
              })),
              imagesBase64
            }
          },
          "*"
        );
      }

      var headerTaglines = [
        "Monte posts incríveis em segundos.",
        "Transforme fotos em carrosséis rápidos.",
        "Gere carrosséis prontos automaticamente.",
        "Crie posts profissionais sem esforço.",
        "Seus carrosséis prontos em instantes."
      ];

      function shuffleTaglines(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function startTaglineRotation() {
        var el = document.getElementById("headerTagline");
        if (!el || headerTaglines.length === 0) return;
        var order = shuffleTaglines(headerTaglines);
        var idx = 0;
        el.textContent = order[0];
        setInterval(function () {
          idx = (idx + 1) % order.length;
          el.classList.add("tagline-fade-out");
          setTimeout(function () {
            el.textContent = order[idx];
            el.classList.remove("tagline-fade-out");
          }, 250);
        }, 3500);
      }

      function init() {
        const fileInput = document.getElementById("fileInput");
        const uploadDropzone = document.getElementById("uploadDropzone");
        const btnBack = document.getElementById("btnBack");
        const btnPrimary = document.getElementById("btnPrimary");

        if (fileInput) {
          fileInput.addEventListener("change", (event) => {
            const target = event.target;
            if (target && target.files) {
              handleFilesSelected(target.files, false);
            }
          });
        }

        const fileInputAddMore = document.getElementById("fileInputAddMore");
        if (fileInputAddMore) {
          fileInputAddMore.addEventListener("change", (event) => {
            const target = event.target;
            if (target && target.files) {
              handleFilesSelected(target.files, true);
              target.value = "";
            }
          });
        }

        if (uploadDropzone) {
          uploadDropzone.addEventListener("dragover", (e) => {
            e.preventDefault();
          });
          uploadDropzone.addEventListener("drop", (e) => {
            e.preventDefault();
            if (e.dataTransfer && e.dataTransfer.files) {
              handleFilesSelected(e.dataTransfer.files, false);
            }
          });
        }

        if (btnBack) {
          btnBack.addEventListener("click", () => {
            if (state.step === 4) {
              setStep(1);
            } else if (state.step > 1) {
              setStep(state.step - 1);
            }
          });
        }

        if (btnPrimary) {
          btnPrimary.addEventListener("click", async () => {
            if (state.step === 1 && state.uploadedImages.length > 0) {
              setStep(2);
            } else if (state.step === 2 && state.selectedTemplateId && state.uploadedImages.length > 0) {
              setStep(3);
              updateProgress(0, "Iniciando...");
              await createCarousel(state.selectedTemplateId, state.uploadedImages);
            }
          });
        }

        window.addEventListener("message", (event) => {
          const msg = event.data?.pluginMessage || event.data;
          if (!msg) return;
          if (msg.type === "progress") {
            updateProgress(msg.percent || 0, msg.log || "");
          } else if (msg.type === "carousel-complete") {
            setStep(4);
          }
        });

        function updateProgress(percent, logText) {
          const fill = document.getElementById("progressBarFill");
          const pct = document.getElementById("progressPercent");
          const log = document.getElementById("progressLog");
          if (fill) fill.style.width = percent + "%";
          if (pct) pct.textContent = Math.round(percent) + "%";
          if (log) {
            const span = document.createElement("span");
            span.className = "progress-log-text";
            span.textContent = logText || "";
            log.innerHTML = "";
            log.appendChild(span);
            span.style.animation = "none";
            void span.offsetHeight;
            span.style.animation = "logFadeIn 0.4s ease, logFadeOut 0.3s ease 2.7s forwards";
          }
        }

        renderTemplates();
        updateUploadViews();
        setStep(state.step);
        startTaglineRotation();
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
